# =============================================================================
# SOKATF MALI — nginx reverse proxy for sokatf.com
# Front  : Astro static build  ->  served directly by nginx (root)
# Backend: Next.js (API + /admin) -> reverse-proxied on 127.0.0.1:4100 (pm2)
#
# ⚠️  ROOT PATH: adjust the `root` line to where you cloned the repo.
#     Here we assume /var/www/apis/sokatf  (build = /var/www/apis/sokatf/apps/web/dist).
#
# Install: /etc/nginx/sites-available/sokatf.com.conf  ->  symlink to sites-enabled
# Requires the websocket map (see websocket-upgrade.conf) in the http{} block.
# =============================================================================

# --- HTTP -> HTTPS + Let's Encrypt challenge ---
server {
    listen 80;
    listen [::]:80;
    server_name sokatf.com www.sokatf.com;

    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
}

# --- HTTPS (the real server) ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sokatf.com www.sokatf.com;

    # Certificates (filled in / managed by certbot --nginx)
    ssl_certificate     /etc/letsencrypt/live/sokatf.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sokatf.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;

    # Astro static build lives here (see DEPLOY.md — run `pnpm build:web`)
    root  /var/www/apis/sokatf/apps/web/dist;
    index index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Enable once you're sure HTTPS is stable:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Backend: Next.js API (forms POST here same-origin) ----
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # ---- Backend: Next.js admin dashboard ----
    location /admin {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---- Backend: Next.js own static assets (needed by /admin) ----
    location /_next/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Front: Astro static (everything else, incl. /_astro/ assets) ----
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    # Long cache for fingerprinted Astro assets
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Cache the downloaded images
    location /img/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}

# =============================================================================
# ALTERNATIVE (only if you'd rather run the front as a node process on a port,
# matching your "front + API two-port" template): switch Astro to the node
# adapter, run it with pm2 on e.g. 127.0.0.1:4200, remove the `root`/static
# `location /` blocks above and replace with:
#
#   location / {
#       proxy_pass http://127.0.0.1:4200;
#       proxy_http_version 1.1;
#       proxy_set_header Host $host;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       proxy_set_header Upgrade $http_upgrade;
#       proxy_set_header Connection $connection_upgrade;
#   }
# =============================================================================
