# =============================================================================
# SOKATF MALI — nginx reverse proxy for sokatf.com
# Front  : Astro static build  ->  served directly by nginx (root)
# Backend: Next.js (API + /admin) -> reverse-proxied on 127.0.0.1:4100 (pm2)
#
# This file is HTTP-only on purpose. Run `certbot --nginx -d sokatf.com -d
# www.sokatf.com` and certbot will AUTOMATICALLY add the HTTPS (443) server
# block with the right certificate paths and an HTTP->HTTPS redirect.
# (Shipping a 443 block here would break `nginx -t` before the cert exists.)
#
# ⚠️  ROOT PATH: adjust `root` if you cloned somewhere other than /var/www/apis/sokatf.
# Requires the websocket map (websocket-upgrade.conf) in /etc/nginx/conf.d/.
# =============================================================================

server {
    listen 80;
    listen [::]:80;
    server_name sokatf.com www.sokatf.com;

    # Let's Encrypt webroot challenge (optional; certbot --nginx uses its own)
    location /.well-known/acme-challenge/ { root /var/www/certbot; }

    # Astro static build
    root  /var/www/apis/sokatf/apps/web/dist;
    index index.html;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # ---- Backend: Next.js API (forms POST here same-origin) ----
    location /api/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # ---- Backend: Next.js admin dashboard ----
    location /admin {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # ---- Backend: Next.js own static assets (needed by /admin) ----
    location /_next/ {
        proxy_pass http://127.0.0.1:4100;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Front: Astro static (everything else, incl. /_astro/ assets) ----
    location / {
        try_files $uri $uri/ $uri.html /404.html;
    }

    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /img/ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }
}
